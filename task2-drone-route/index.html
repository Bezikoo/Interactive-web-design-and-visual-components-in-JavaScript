<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Візуалізація маршруту дрона</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🚁 Маршрут дрона</h1>
      <div class="header-controls">
        <div class="mode-group">
          <label class="control-label">Режим польоту:</label>
          <div class="mode-buttons">
            <button class="mode-btn is-active" data-mode="auto">Авто</button>
            <button class="mode-btn" data-mode="manual">Ручний</button>
            <button class="mode-btn" data-mode="return">Повернення</button>
          </div>
        </div>
        <button class="btn btn-primary" id="flyBtn">Виконати маршрут</button>
        <button class="btn btn-secondary" id="resetBtn">Скинути</button>
      </div>
    </header>

    <div class="workspace">
      <!-- SVG карта -->
      <div class="map-container">
        <svg id="droneMap" viewBox="0 0 700 480" preserveAspectRatio="xMidYMid meet">
          <!-- Фон карти -->
          <defs>
            <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="#0f2d4a"/>
              <stop offset="100%" stop-color="#050e1a"/>
            </radialGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glowStrong">
              <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <marker id="arrowMarker" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
              <path d="M0,0 L0,6 L6,3 z" fill="#3b9ddd" opacity="0.7"/>
            </marker>
          </defs>

          <!-- Фон -->
          <rect width="700" height="480" fill="url(#bgGrad)"/>

          <!-- Сітка -->
          <g class="grid" opacity="0.12" stroke="#4ecdc4" stroke-width="0.5">
            <line x1="0" y1="80" x2="700" y2="80"/>
            <line x1="0" y1="160" x2="700" y2="160"/>
            <line x1="0" y1="240" x2="700" y2="240"/>
            <line x1="0" y1="320" x2="700" y2="320"/>
            <line x1="0" y1="400" x2="700" y2="400"/>
            <line x1="100" y1="0" x2="100" y2="480"/>
            <line x1="200" y1="0" x2="200" y2="480"/>
            <line x1="300" y1="0" x2="300" y2="480"/>
            <line x1="400" y1="0" x2="400" y2="480"/>
            <line x1="500" y1="0" x2="500" y2="480"/>
            <line x1="600" y1="0" x2="600" y2="480"/>
          </g>

          <!-- Зони ризику -->
          <g id="riskZones">
            <ellipse class="risk-zone" cx="200" cy="150" rx="65" ry="50"
              fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4"/>
            <text x="200" y="155" text-anchor="middle" fill="#ef4444" font-size="10" opacity="0.8">⚠ Зона A</text>

            <ellipse class="risk-zone" cx="520" cy="320" rx="75" ry="55"
              fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4"/>
            <text x="520" y="325" text-anchor="middle" fill="#fbbf24" font-size="10" opacity="0.8">⚠ Зона B</text>

            <ellipse class="risk-zone" cx="350" cy="400" rx="50" ry="35"
              fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3"/>
            <text x="350" y="405" text-anchor="middle" fill="#ef4444" font-size="9" opacity="0.7">⚠ Зона C</text>
          </g>

          <!-- Маршрутна лінія -->
          <polyline id="routeLine"
            points="80,420 160,300 280,200 420,160 560,240 620,380"
            fill="none" stroke="#3b9ddd" stroke-width="2"
            stroke-dasharray="8 5" opacity="0.5"
            marker-mid="url(#arrowMarker)"/>

          <!-- Активна лінія (анімована) -->
          <polyline id="activeRouteLine"
            points="80,420 160,300 280,200 420,160 560,240 620,380"
            fill="none" stroke="#4ecdc4" stroke-width="2.5"
            stroke-dasharray="0 2000" opacity="0"/>

          <!-- Точки маршруту -->
          <g id="waypointsGroup">
            <!-- Wp 0: Старт -->
            <g class="waypoint" data-wp="0" data-x="80" data-y="420">
              <circle class="wp-ring" cx="80" cy="420" r="22" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
              <circle class="wp-dot" cx="80" cy="420" r="10" fill="#4ecdc4" stroke="#fff" stroke-width="2"/>
              <text class="wp-label" x="80" y="447" text-anchor="middle" fill="#4ecdc4" font-size="10">Старт</text>
            </g>
            <!-- Wp 1 -->
            <g class="waypoint" data-wp="1" data-x="160" data-y="300">
              <circle class="wp-ring" cx="160" cy="300" r="18" fill="none" stroke="#3b9ddd" stroke-width="1" opacity="0.3"/>
              <circle class="wp-dot" cx="160" cy="300" r="8" fill="#3b9ddd" stroke="#fff" stroke-width="2"/>
              <text class="wp-label" x="160" y="322" text-anchor="middle" fill="#3b9ddd" font-size="10">Т-1</text>
            </g>
            <!-- Wp 2 -->
            <g class="waypoint" data-wp="2" data-x="280" data-y="200">
              <circle class="wp-ring" cx="280" cy="200" r="18" fill="none" stroke="#3b9ddd" stroke-width="1" opacity="0.3"/>
              <circle class="wp-dot" cx="280" cy="200" r="8" fill="#3b9ddd" stroke="#fff" stroke-width="2"/>
              <text class="wp-label" x="280" y="222" text-anchor="middle" fill="#3b9ddd" font-size="10">Т-2</text>
            </g>
            <!-- Wp 3 -->
            <g class="waypoint" data-wp="3" data-x="420" data-y="160">
              <circle class="wp-ring" cx="420" cy="160" r="18" fill="none" stroke="#3b9ddd" stroke-width="1" opacity="0.3"/>
              <circle class="wp-dot" cx="420" cy="160" r="8" fill="#3b9ddd" stroke="#fff" stroke-width="2"/>
              <text class="wp-label" x="420" y="182" text-anchor="middle" fill="#3b9ddd" font-size="10">Т-3</text>
            </g>
            <!-- Wp 4 -->
            <g class="waypoint" data-wp="4" data-x="560" data-y="240">
              <circle class="wp-ring" cx="560" cy="240" r="18" fill="none" stroke="#3b9ddd" stroke-width="1" opacity="0.3"/>
              <circle class="wp-dot" cx="560" cy="240" r="8" fill="#3b9ddd" stroke="#fff" stroke-width="2"/>
              <text class="wp-label" x="560" y="262" text-anchor="middle" fill="#3b9ddd" font-size="10">Т-4</text>
            </g>
            <!-- Wp 5: Фініш -->
            <g class="waypoint" data-wp="5" data-x="620" data-y="380">
              <circle class="wp-ring" cx="620" cy="380" r="22" fill="none" stroke="#f87171" stroke-width="1" opacity="0.3"/>
              <circle class="wp-dot" cx="620" cy="380" r="10" fill="#f87171" stroke="#fff" stroke-width="2"/>
              <text class="wp-label" x="620" y="407" text-anchor="middle" fill="#f87171" font-size="10">Фініш</text>
            </g>
          </g>

          <!-- Дрон -->
          <g id="droneObject" transform="translate(80,420)">
            <circle r="14" fill="rgba(78,205,196,0.15)" stroke="#4ecdc4" stroke-width="1.5" filter="url(#glow)"/>
            <text text-anchor="middle" dominant-baseline="central" font-size="16">🚁</text>
          </g>
        </svg>

        <!-- Tooltip для карти -->
        <div id="mapTooltip" class="map-tooltip"></div>
      </div>

      <!-- Панель інформації -->
      <aside class="info-panel">
        <div class="info-section">
          <h3 class="info-title">Стан дрона</h3>
          <div class="info-row">
            <span class="info-key">Статус:</span>
            <span class="info-val" id="droneStatus">Очікування</span>
          </div>
          <div class="info-row">
            <span class="info-key">Режим:</span>
            <span class="info-val" id="droneMode">Авто</span>
          </div>
          <div class="info-row">
            <span class="info-key">Точка:</span>
            <span class="info-val" id="currentWp">Старт (0)</span>
          </div>
          <div class="info-row">
            <span class="info-key">Прогрес:</span>
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="info-val" id="progressText">0%</span>
          </div>
        </div>

        <div class="info-section">
          <h3 class="info-title">Вибрана точка</h3>
          <div id="selectedWpInfo" class="wp-info-box">
            <p class="info-placeholder">Натисніть на точку маршруту</p>
          </div>
        </div>

        <div class="info-section">
          <h3 class="info-title">Легенда</h3>
          <div class="legend-item"><span class="legend-dot" style="background:#4ecdc4"></span>Старт/Поточна точка</div>
          <div class="legend-item"><span class="legend-dot" style="background:#3b9ddd"></span>Точка маршруту</div>
          <div class="legend-item"><span class="legend-dot" style="background:#f87171"></span>Фініш / Пройдено</div>
          <div class="legend-item"><span class="legend-dot risk-dot" style="border-color:#ef4444"></span>Зона ризику (критична)</div>
          <div class="legend-item"><span class="legend-dot risk-dot" style="border-color:#fbbf24"></span>Зона ризику (обмеження)</div>
        </div>

        <div class="status-box" id="statusBox"></div>
      </aside>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
